name: 🤖 Pixellab ShimulXD Bot

on:
  push:
    branches: [ main ]
  schedule:
    # প্রতি ৪ ঘণ্টায় অটো রিস্টার্ট (GitHub Actions 6h limit এর মধ্যে safe)
    - cron: '0 */4 * * *'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Manual run reason'
        required: false
        default: 'Manual restart'

jobs:
  run-bot:
    name: 🚀 Run Telegram Bot
    runs-on: ubuntu-latest
    timeout-minutes: 235

    steps:
      # ── ১. কোড চেকআউট ─────────────────────────────────────
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # ── ২. Python সেটআপ ────────────────────────────────────
      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── ৩. ডিপেন্ডেন্সি ইনস্টল ────────────────────────────
      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── ৪. এনভায়রনমেন্ট চেক ──────────────────────────────
      - name: 🔍 Verify Environment
        run: |
          python -c "import aiogram, motor, aiohttp; print('✅ All packages OK')"

      # ── ৫. বট রান ─────────────────────────────────────────
      - name: 🤖 Run Bot
        run: python bot.py

      # ── ৬. ব্যর্থ হলে লগ আপলোড ────────────────────────────
      - name: 📋 Upload Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bot-error-logs
          path: bot.log
          retention-days: 3
