name: Pixellab ShimulXD Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'   # প্রতি ৪ ঘণ্টা পর পর অটো রিস্টার্ট
  workflow_dispatch:          # ম্যানুয়াল রান অপশন

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v3

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔒 Security Check
        run: |
          echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> $GITHUB_ENV

      - name: 🚀 Run Bot
        timeout-minutes: 235
        run: python bot.py
