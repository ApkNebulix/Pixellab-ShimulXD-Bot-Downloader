name: Pixellab ShimulXD Bot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *'   # প্রতি ৪ ঘণ্টায় অটো রিস্টার্ট
  workflow_dispatch:          # ম্যানুয়াল রান অপশন

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: ✅ Checkout Code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: 📥 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🚀 Run Bot
        timeout-minutes: 235
        run: python bot.py
        env:
          PYTHONUNBUFFERED: "1"
          PYTHONDONTWRITEBYTECODE: "1"
