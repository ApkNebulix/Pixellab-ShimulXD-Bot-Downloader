name: Pixellab Bot Auto Run

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' # প্রতি ৪ ঘণ্টা পর পর রান হবে

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot
        timeout-minutes: 235 # প্রায় ৪ ঘণ্টা (২৪০ মি.) রান হবে, তারপর অটো বন্ধ হয়ে নতুন করে শুরু হবে
        run: python bot.py
