name: Pixellab ShimulXD Bot Runner

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */4 * * *' # প্রতি ৪ ঘণ্টা পর পর অটো রিস্টার্ট
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

# নতুন রান শুরু হলে আগের রানিং টাস্ক বন্ধ করে দিবে
concurrency:
  group: bot-running
  cancel-in-progress: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4 # এখানে ভুল ছিল, এখন ঠিক করা হয়েছে
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Bot and Generate Log
        id: bot_run
        timeout-minutes: 235
        continue-on-error: true
        run: |
          # বটের আউটপুট এবং এরর লগে সেভ হবে
          python bot.py > bot.log 2>&1

      - name: Send Log to Admin
        if: always()
        run: |
          CAPTION="🚀 **Bot Session Update**%0A%0AStatus: Process Restarted.%0AAdmin ID: 8381570120"
          # টেলিক্রাম এপিআই দিয়ে এডমিনকে লগ পাঠানো
          curl -F document=@"bot.log" "https://api.telegram.org/bot8354048442:AAGwTXhT9O3fA4m30ulMkCtEkLmn0_Umil4/sendDocument?chat_id=8381570120&caption=$CAPTION&parse_mode=Markdown"
